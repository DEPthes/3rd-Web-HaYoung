<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css" />
	<title>loginPage구현</title>
</head>

<body>
	<div class="firstRectangleWrapper">
		<img src="images/bigRectangle.png" class="bigRectangle" />
		<div class="firstRectangle">
			<img src="images/mainlogo.png" class="mainlogo" />
			<img src="images/InputNum.png" class="InputNum" />
			<img src="images/InputPassword.png" class="InputPassword" />
			<img src="images/loginBlue.png" class="loginBlue" />
			<p class="log">로그인</p>
			<p class="or">or</p>
			<img src="images/Kakaologin.png" class="Kakaologin" />
			<p class="miss">비밀번호를 잊으셨나요?</p>
		</div>
	</div>
	<div class="secondRectangleWrapper">
		<img src="images/smallRectangle.png" class="smallRectangle" />
		<div class="secondRectangle">
			<p class="no">계정이 없으신가요?</p>
			<p class="enter">가입하기</p>
		</div>
	</div>

	<div>
		<p class="download">앱을 다운로드 하세요</p>
	</div>

	<div class="playStore">
		<img src="images/googlePlay.png" class="googlePlay" />
		<img src="images/appStore.png" class="appStore" />
	</div>

</body>

</html>
