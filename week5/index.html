<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Weather API</title>
</head>

<body>
	<div class="container">
		<div class="images">
			<img src="cloudImg.png" alt="Cloudy Weather">
			<img src="sunImg.png" alt="Sunny Weather">
			<img src="rainImg.png" alt="Rainy Weather">

		</div>
		<button class="button" type="button">날씨를 알아보세요</button>
		<div class="information">
			<p>위치</p>
			<p class="place"></p><br>
			<p>기온</p>
			<p class="temperature"></p><br>
			<p>풍속</p>
			<p class="windSpeed"></p><br>
			<p>날씨 설명</p>
			<p class="description"></p><br>
		</div>
	</div>
	<script src="main.js"></script>
</body>

</html>
